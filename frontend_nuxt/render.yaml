# render.yaml — OpsFlow deployment blueprint for Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: opsflow
    runtime: node
    region: frankfurt  # Choose closest to your users (frankfurt, oregon, singapore, ohio)
    plan: free         # Change to 'starter' or higher for production
    
    buildCommand: npm install && npm run build:prod
    startCommand: npm run start
    
    healthCheckPath: /api/auth/me
    
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (Neon connection string)
      
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      
      - key: META_SYSTEM_TOKEN
        sync: false
      
      - key: META_APP_ID
        sync: false
      
      - key: META_APP_SECRET
        sync: false
      
      - key: META_PAGE_IDS
        sync: false
      
      - key: META_AD_ACCOUNT_IDS
        sync: false
      
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      
      - key: GOOGLE_SHEET_ID
        sync: false
      
      - key: GROQ_API_KEY
        sync: false
